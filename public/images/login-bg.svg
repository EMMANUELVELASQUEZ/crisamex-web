<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 900">
  <defs>
    <radialGradient id="rb" cx="30%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#0a0a0a"/>
      <stop offset="100%" stop-color="#050505"/>
    </radialGradient>
    <radialGradient id="ra" cx="30%" cy="50%" r="40%">
      <stop offset="0%" stop-color="#C8151B" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#C8151B" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1400" height="900" fill="url(#rb)"/>
  <rect width="1400" height="900" fill="url(#ra)"/>
  <!-- Shield icon center -->
  <g transform="translate(420,450)">
    <path d="M0,-120 L100,-80 L100,40 Q100,120 0,150 Q-100,120 -100,40 L-100,-80 Z" fill="none" stroke="rgba(200,21,27,0.15)" stroke-width="2"/>
    <path d="M0,-80 L60,-50 L60,30 Q60,80 0,100 Q-60,80 -60,30 L-60,-50 Z" fill="rgba(200,21,27,0.06)"/>
    <text x="0" y="20" text-anchor="middle" font-family="Arial" font-size="40" fill="rgba(200,21,27,0.3)">☢</text>
  </g>
  <!-- Grid -->
  <g stroke="rgba(255,255,255,0.03)" stroke-width="1">
    <line x1="0" y1="150" x2="1400" y2="150"/>
    <line x1="0" y1="300" x2="1400" y2="300"/>
    <line x1="0" y1="450" x2="1400" y2="450"/>
    <line x1="0" y1="600" x2="1400" y2="600"/>
    <line x1="0" y1="750" x2="1400" y2="750"/>
    <line x1="200" y1="0" x2="200" y2="900"/>
    <line x1="400" y1="0" x2="400" y2="900"/>
    <line x1="600" y1="0" x2="600" y2="900"/>
    <line x1="800" y1="0" x2="800" y2="900"/>
    <line x1="1000" y1="0" x2="1000" y2="900"/>
    <line x1="1200" y1="0" x2="1200" y2="900"/>
  </g>

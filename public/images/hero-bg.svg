<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1800 900">
  <defs>
    <radialGradient id="h1" cx="60%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#1a0508"/>
      <stop offset="60%" stop-color="#0d0d0d"/>
      <stop offset="100%" stop-color="#050505"/>
    </radialGradient>
    <radialGradient id="h2" cx="75%" cy="45%" r="45%">
      <stop offset="0%" stop-color="#C8151B" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#C8151B" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1800" height="900" fill="url(#h1)"/>
  <rect width="1800" height="900" fill="url(#h2)"/>
  <!-- Grid lines -->
  <g stroke="rgba(200,21,27,0.07)" stroke-width="1">

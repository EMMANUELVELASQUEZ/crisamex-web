  </g>
  <g fill="rgba(255,255,255,0.08)">
    <circle cx="300" cy="380" r="2"/><circle cx="650" cy="560" r="2.5"/>
    <circle cx="880" cy="720" r="2"/><circle cx="1250" cy="200" r="2.5"/>
    <circle cx="1580" cy="760" r="2"/><circle cx="1720" cy="340" r="2"/>

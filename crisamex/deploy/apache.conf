<VirtualHost *:80>
    ServerAdmin contacto@crisamex.com
    DocumentRoot /var/www/html/public

    # ── SEGURIDAD MÁXIMA ────────────────────────────────────
    
    # Evitar clickjacking
    Header always set X-Frame-Options "DENY"
    
    # Evitar MIME sniffing
    Header always set X-Content-Type-Options "nosniff"
    
    # XSS Protection
    Header always set X-XSS-Protection "1; mode=block"
    
    # Referrer seguro
    Header always set Referrer-Policy "strict-origin-when-cross-origin"
    
    # Permisos del navegador - desactivar todo
    Header always set Permissions-Policy "geolocation=(), microphone=(), camera=(), payment=(), usb=(), interest-cohort=()"
    
    # Content Security Policy
    Header always set Content-Security-Policy "default-src 'self' https:; script-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com https://fonts.googleapis.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdnjs.cloudflare.com; font-src 'self' https://fonts.gstatic.com https://cdnjs.cloudflare.com; img-src 'self' data: https://images.unsplash.com https://*.railway.app; connect-src 'self';"
    
    # Ocultar versión de Apache
    Header always unset X-Powered-By
    Header always unset Server
    
    # Anti-hotlinking de imágenes
    RewriteEngine On
    RewriteCond %{HTTP_REFERER} !^$
    RewriteCond %{HTTP_REFERER} !^https://crisamex-web-production.up.railway.app [NC]
    RewriteRule \.(jpg|jpeg|png|gif|svg|webp)$ - [F,NC]

    <Directory /var/www/html/public>
        Options -Indexes -ExecCGI +FollowSymLinks
        AllowOverride All
        Require all granted

        RewriteEngine On
        RewriteCond %{REQUEST_FILENAME} !-f
        RewriteCond %{REQUEST_FILENAME} !-d
        RewriteRule ^(.*)$ index.php [QSA,L]

        # Bloquear acceso a archivos sensibles
        <FilesMatch "\.(env|sql|log|bak|old|conf|ini|sh|bash|git)$">
            Require all denied
        </FilesMatch>
    </Directory>

    # Bloquear scanners y bots maliciosos
    RewriteCond %{HTTP_USER_AGENT} (havij|nikto|sqlmap|nmap|masscan|nessus|burpsuite|dirbuster|gobuster|wfuzz|acunetix) [NC]
    RewriteRule .* - [F,L]

    # Bloquear SQL injection en URL
    RewriteCond %{QUERY_STRING} (union.*select|select.*from|insert.*into|drop.*table|delete.*from) [NC]
    RewriteRule .* - [F,L]

    # Bloquear XSS en URL
    RewriteCond %{QUERY_STRING} (<script|javascript:|vbscript:|onload=|onerror=) [NC]
    RewriteRule .* - [F,L]

    # Bloquear path traversal
    RewriteCond %{REQUEST_URI} \.\./
    RewriteRule .* - [F,L]

    ErrorLog ${APACHE_LOG_DIR}/error.log
    CustomLog ${APACHE_LOG_DIR}/access.log combined
</VirtualHost>

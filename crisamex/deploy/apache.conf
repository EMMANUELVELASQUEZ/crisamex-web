# ================================================================
# CRISAMEX — Seguridad Enterprise Nivel Bancario
# ================================================================

ServerTokens Prod
ServerSignature Off
TraceEnable Off

<VirtualHost *:80>
    ServerAdmin contacto@crisamex.com
    DocumentRoot /var/www/html/public

    # ── HTTPS FORZADO ────────────────────────────────────────
    RewriteEngine On
    RewriteCond %{HTTP:X-Forwarded-Proto} !https
    RewriteCond %{HTTP_HOST} !^localhost
    RewriteRule ^(.*)$ https://%{HTTP_HOST}%{REQUEST_URI} [R=301,L]

    # ── HEADERS DE SEGURIDAD NIVEL BANCARIO ─────────────────

    # HSTS — fuerza HTTPS por 1 año (como los bancos)
    Header always set Strict-Transport-Security "max-age=31536000; includeSubDomains; preload"

    # Clickjacking — ningún iframe puede embeber tu sitio
    Header always set X-Frame-Options "DENY"

    # MIME sniffing — el browser respeta el tipo de contenido
    Header always set X-Content-Type-Options "nosniff"

    # XSS — protección del browser
    Header always set X-XSS-Protection "1; mode=block"

    # Referrer — no filtra URLs internas
    Header always set Referrer-Policy "strict-origin-when-cross-origin"

    # CSP — solo permite recursos de fuentes confiables
    Header always set Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com https://fonts.googleapis.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdnjs.cloudflare.com; font-src 'self' https://fonts.gstatic.com https://cdnjs.cloudflare.com; img-src 'self' data: https://images.unsplash.com blob:; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self';"

    # Permisos del navegador — desactivar todo lo peligroso
    Header always set Permissions-Policy "accelerometer=(), camera=(), geolocation=(), gyroscope=(), magnetometer=(), microphone=(), payment=(), usb=(), interest-cohort=()"

    # Cross-Origin policies
    Header always set Cross-Origin-Embedder-Policy "require-corp"
    Header always set Cross-Origin-Opener-Policy "same-origin"
    Header always set Cross-Origin-Resource-Policy "same-origin"

    # Ocultar información del servidor
    Header always unset X-Powered-By
    Header always unset Server
    Header always unset X-AspNet-Version
    Header always unset X-AspNetMvc-Version

    # Cache control para datos sensibles
    Header always set Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate" env=SECURE_PAGE
    Header always set Pragma "no-cache" env=SECURE_PAGE

    # ── DIRECTORIO PRINCIPAL ─────────────────────────────────
    <Directory /var/www/html/public>
        Options -Indexes -ExecCGI -Includes +FollowSymLinks
        AllowOverride All
        Require all granted

        # Router PHP
        RewriteEngine On
        RewriteCond %{REQUEST_FILENAME} !-f
        RewriteCond %{REQUEST_FILENAME} !-d
        RewriteRule ^(.*)$ index.php [QSA,L]

        # Bloquear archivos peligrosos
        <FilesMatch "\.(env|sql|log|bak|old|conf|ini|sh|bash|git|yml|yaml|json|lock|xml|htpasswd|htaccess)$">
            Require all denied
        </FilesMatch>
    </Directory>

    # ── BLOQUEAR CARPETAS INTERNAS ───────────────────────────
    <LocationMatch "^/(src|database|docker|vendor|deploy|\.git|\.env)">
        Require all denied
    </LocationMatch>

    # ── PROTECCIÓN ANTI-BOTS Y SCANNERS ─────────────────────
    RewriteEngine On

    # Bloquear herramientas de hacking conocidas
    RewriteCond %{HTTP_USER_AGENT} (havij|nikto|sqlmap|nmap|masscan|nessus|openvas|burpsuite|dirbuster|gobuster|wfuzz|acunetix|appscan|webinspect|zgrab|shodan|censys|qualys|rapid7|metasploit|w3af|skipfish|arachni|vega|zap|paros|webscarab) [NC]
    RewriteRule .* - [F,L]

    # Bloquear user agents vacíos o sospechosos
    RewriteCond %{HTTP_USER_AGENT} ^(-|_|\.|\s)*$
    RewriteRule .* - [F,L]

    # Bloquear SQL Injection en URL y query string
    RewriteCond %{QUERY_STRING} (union.*select|select.*from|insert.*into|drop.*table|delete.*from|update.*set|exec.*\(|cast.*\(|convert.*\(|char.*\(|declare.*@|benchmark.*\(|sleep.*\() [NC]
    RewriteRule .* - [F,L]

    # Bloquear XSS en URL
    RewriteCond %{QUERY_STRING} (<script|javascript:|vbscript:|onload\s*=|onerror\s*=|onclick\s*=|onmouseover\s*=|onfocus\s*=|<iframe|<object|<embed|<applet|<form|document\.cookie|document\.write|window\.location|eval\s*\() [NC]
    RewriteRule .* - [F,L]

    # Bloquear Path Traversal
    RewriteCond %{REQUEST_URI} (\.\./|\.\.\\|%2e%2e%2f|%252e%252e|%c0%af|%c1%9c) [NC]
    RewriteRule .* - [F,L]

    # Bloquear Remote File Inclusion
    RewriteCond %{QUERY_STRING} (https?|ftp|php|data):// [NC]
    RewriteRule .* - [F,L]

    # Bloquear ataques de fuerza bruta en login (máx requests)
    RewriteCond %{REQUEST_URI} ^/(admin/login|portal/login|portal/registro)$
    RewriteCond %{REQUEST_METHOD} POST
    RewriteCond %{HTTP:X-Forwarded-For} ^$
    RewriteRule .* - [E=RATE_LIMIT:1]

    # Bloquear métodos HTTP peligrosos
    RewriteCond %{REQUEST_METHOD} ^(TRACE|TRACK|OPTIONS|DELETE|PUT|PATCH)$
    RewriteRule .* - [F,L]

    # ── PROTECCIÓN DE ARCHIVOS SENSIBLES ────────────────────
    <FilesMatch "^(composer\.(json|lock)|package\.json|webpack\.config|Dockerfile|docker-compose|\.gitignore|\.env|README)">
        Require all denied
    </FilesMatch>

    # ── LOGS ─────────────────────────────────────────────────
    ErrorLog ${APACHE_LOG_DIR}/error.log
    CustomLog ${APACHE_LOG_DIR}/access.log combined

</VirtualHost>

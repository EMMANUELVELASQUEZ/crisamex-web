version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: crisamex_app
    restart: unless-stopped
    ports:
      - "8090:80"
    volumes:
      - ./public:/var/www/html/public
      - ./src:/var/www/html/src
      - ./public/uploads:/var/www/html/public/uploads
    depends_on:
      db:
        condition: service_healthy
    environment:
      - DB_HOST=db
      - DB_NAME=crisamex_db
      - DB_USER=crisamex_user
      - DB_PASS=Crisam3x2024!
      - APP_URL=http://localhost:8080
      - APP_ENV=production
    networks:
      - crisamex_net

  db:
    image: mysql:8.0
    container_name: crisamex_db
    restart: unless-stopped
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: Root_Crisam3x!
      MYSQL_DATABASE: crisamex_db
      MYSQL_USER: crisamex_user
      MYSQL_PASSWORD: Crisam3x2024!
    volumes:
      - crisamex_db_data:/var/lib/mysql
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "crisamex_user", "-pCrisam3x2024!"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - crisamex_net

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: crisamex_phpmyadmin
    restart: unless-stopped
    ports:
      - "8091:80"
    environment:
      PMA_HOST: db
      PMA_USER: crisamex_user
      PMA_PASSWORD: Crisam3x2024!
    depends_on:
      - db
    networks:
      - crisamex_net

volumes:
  crisamex_db_data:

networks:
  crisamex_net:
    driver: bridge

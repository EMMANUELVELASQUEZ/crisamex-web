<VirtualHost *:80>
    ServerAdmin contacto@crisamex.com
    DocumentRoot /var/www/html/public

    <Directory /var/www/html/public>
        Options -Indexes -ExecCGI +FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    # ── SEGURIDAD ENTERPRISE — HEADERS ──────────────────────────
    # Evita clickjacking
    Header always set X-Frame-Options "SAMEORIGIN"
    # Evita MIME sniffing
    Header always set X-Content-Type-Options "nosniff"
    # XSS Protection (legacy browsers)
    Header always set X-XSS-Protection "1; mode=block"
    # Referrer seguro
    Header always set Referrer-Policy "strict-origin-when-cross-origin"
    # Permisos del navegador — desactivar todo lo innecesario
    Header always set Permissions-Policy "geolocation=(), microphone=(), camera=(), payment=(), usb=()"
    # Content Security Policy estricto
    Header always set Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com https://fonts.googleapis.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdnjs.cloudflare.com; font-src 'self' https://fonts.gstatic.com https://cdnjs.cloudflare.com; img-src 'self' data: https://images.unsplash.com; connect-src 'self'; frame-ancestors 'none';"
    # Forzar HTTPS en producción
    Header always set Strict-Transport-Security "max-age=31536000; includeSubDomains; preload"
    # Ocultar servidor
    Header always unset X-Powered-By
    Header always unset Server
    ServerTokens Prod
    ServerSignature Off

    # ── OCULTAR INFORMACIÓN SENSIBLE ─────────────────────────────
    <FilesMatch "\.(env|sql|log|json|yaml|yml|ini|conf|sh|bash|bak|old|git)$">
        Require all denied
    </FilesMatch>
    <FilesMatch "^(composer|package|webpack|\.htaccess|\.gitignore)">
        Require all denied
    </FilesMatch>

    # Bloquear acceso a carpetas internas
    <DirectoryMatch "/(src|database|docker|vendor)/">
        Require all denied
    </DirectoryMatch>

    ErrorLog ${APACHE_LOG_DIR}/crisamex_error.log
    CustomLog ${APACHE_LOG_DIR}/crisamex_access.log combined
</VirtualHost>
